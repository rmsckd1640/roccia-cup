spring:
  datasource:
    url: jdbc:h2:mem:roccia;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

cors:
  allowed-origin-patterns: http://localhost:*,http://127.0.0.1:*,http://[::1]:*
